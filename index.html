                reportTitle = `Laporan Tunggakan Perbulan - ${formatBulanTahunLengkap(filterPeriode)}`;
                const tags = tagihan.filter(t => t.periode === filterPeriode && getSisa(t) > 0);
                reportHtml = `<div class="header"><h2>${settings.appName}</h2>${settings.appSubtitle ? `<h4>${settings.appSubtitle}</h4>` : ''}<h3>${reportTitle}</h3></div><p>Total Sisa Tunggakan Bulan Ini: <strong style="color:red">${formatRp(tags.reduce((s,t)=>s+getSisa(t),0))}</strong></p>
                    <table><thead><tr><th>No</th><th>Nama</th><th>Total Tagihan</th><th>Sudah Dibayar</th><th>Sisa Tunggakan</th></tr></thead><tbody>
                    ${tags.map(t => `<tr><td>${getNo(t.idPelanggan)}</td><td>${getName(t.idPelanggan)}</td><td class="text-right">${formatRp(t.total)}</td><td class="text-right">${formatRp(getTerbayar(t))}</td><td class="text-right font-bold" style="color:red">${formatRp(getSisa(t))}</td></tr>`).join('')}
                    ${tags.length===0?'<tr><td colspan="5" class="text-center">Aman, tidak ada tunggakan</td></tr>':''}</tbody></table>`;
            } else {
                reportTitle = `Laporan Tunggakan Keseluruhan`;
                
                const grouped = tagihan.filter(t => getSisa(t) > 0).reduce((acc, t) => { 
                    if(!acc[t.idPelanggan]) acc[t.idPelanggan]={tot:0, bayar:0, sisa:0, b:[]}; 
                    acc[t.idPelanggan].tot+=t.total; acc[t.idPelanggan].bayar+=getTerbayar(t); acc[t.idPelanggan].sisa+=getSisa(t); acc[t.idPelanggan].b.push(formatBulanTahunSingkat(t.periode)); 
                    return acc; 
                }, {});

                const grandTotal = Object.values(grouped).reduce((s, g) => s + g.sisa, 0);

                reportHtml = `<div class="header"><h2>${settings.appName}</h2>${settings.appSubtitle ? `<h4>${settings.appSubtitle}</h4>` : ''}<h3>${reportTitle}</h3></div><p>Total Seluruh Uang Menunggak (Semua Tahun): <strong style="color:red">${formatRp(grandTotal)}</strong></p>
                    <table><thead><tr><th>No</th><th>Nama</th><th>Bulan Menunggak</th><th>Sisa Tunggakan</th></tr></thead><tbody>
                    ${Object.keys(grouped).map(id => `<tr><td>${getNo(id)}</td><td>${getName(id)}</td><td style="font-size:10px;">${grouped[id].b.join(', ')}</td><td class="text-right font-bold" style="color:red">${formatRp(grouped[id].sisa)}</td></tr>`).join('')}
                    ${Object.keys(grouped).length===0?'<tr><td colspan="4" class="text-center">Luar Biasa, tidak ada satupun tunggakan!</td></tr>':''}</tbody></table>`;
            }

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold border-b pb-4 text-gray-800">Pusat Pelaporan</h2>
                    <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex flex-wrap gap-4 items-end">
                        <div><label className="block text-sm font-medium text-gray-700 mb-1">Jenis Laporan</label><select value={reportType} onChange={e=>setReportType(e.target.value)} className="border p-2 rounded-lg outline-none text-sm min-w-[200px] bg-white"><option value="bulanan">Bulanan (Semua Data)</option><option value="tahunan">Tahunan (Pendapatan)</option><option value="tunggakan_bulan">Tunggakan (Perbulan)</option><option value="tunggakan_tahun">Tunggakan (Semua Tunggakan)</option></select></div>
                        {(reportType==='bulanan'||reportType==='tunggakan_bulan') && <div><label className="block text-sm font-medium text-gray-700 mb-1">Periode</label><input type="month" value={filterPeriode} onChange={e=>setFilterPeriode(e.target.value)} className="border p-2 rounded-lg outline-none text-sm" /></div>}
                        {(reportType==='tahunan') && <div><label className="block text-sm font-medium text-gray-700 mb-1">Tahun</label><input type="number" value={filterTahun} onChange={e=>setFilterTahun(e.target.value)} className="border p-2 rounded-lg outline-none text-sm w-32" /></div>}
                        <button onClick={()=>printContent(reportHtml, 'a4')} className="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg flex items-center text-sm font-medium shadow-sm md:ml-auto"><i className="fas fa-print mr-2"></i> Cetak A4</button>
                    </div>
                    <div className="bg-white p-8 rounded-xl border shadow-sm min-h-[500px] overflow-x-auto print-preview-container"><div dangerouslySetInnerHTML={{ __html: reportHtml.replace(/<table/g, '<table class="w-full border-collapse border border-gray-300"').replace(/<th/g, '<th class="border border-gray-300 bg-gray-100 p-2 text-center"').replace(/<td/g, '<td class="border border-gray-300 p-2"') }} /></div>
                </div>
            );
        }

        // Render Aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
