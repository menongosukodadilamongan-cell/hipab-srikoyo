<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi HIPAB SRIKOYO</title>
    
    <!-- 1. Import Tailwind CSS (Untuk Desain) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Import FontAwesome (Untuk Ikon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 3. Import React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 4. Import Babel (Agar browser mengerti kode React) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 5. Import Firebase (Versi Compat yang mudah dipakai di HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Tempat Aplikasi Dimuat -->
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🛑 KONFIGURASI FIREBASE 🛑
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCGxO7B7PMPv3YhSNVcm-CpWUcxVPIA4bM",
            authDomain: "hipab-srikoyo-data.firebaseapp.com",
            projectId: "hipab-srikoyo-data",
            storageBucket: "hipab-srikoyo-data.firebasestorage.app",
            messagingSenderId: "741286764093",
            appId: "1:741286764093:web:b355072e65eca80ea91454",
            measurementId: "G-C5YGGWQDPQ"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hipab-srikoyo-app';

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        // --- UTILITY ---
        const formatRp = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        
        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); return true; } 
            catch (err) { return false; } 
            finally { document.body.removeChild(textArea); }
        };

        const printContent = (htmlContent, mode) => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            const doc = iframe.contentWindow.document;
            doc.open();
            let style = `<style>body { font-family: sans-serif; color: #333; }`;
            if (mode === 'receipt') {
                style += `@page { size: 58mm auto; margin: 2mm; } body { width: 54mm; font-size: 11px; margin:0; padding:0; } hr { border: 0.5px dashed #000; margin: 5px 0; } .text-center { text-align: center; } .text-right { text-align: right; } .bold { font-weight: bold; }`;
            } else {
                style += `@page { size: A4 portrait; margin: 15mm; } table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; } th, td { border: 1px solid #333; padding: 8px; text-align: left; } th { background-color: #f3f4f6; } .text-center { text-align: center; } .text-right { text-align: right; } .header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }`;
            }
            style += `</style>`;
            doc.write(`<html><head>${style}</head><body>${htmlContent}</body></html>`);
            doc.close();
            setTimeout(() => {
                iframe.contentWindow.focus(); iframe.contentWindow.print();
                setTimeout(() => document.body.removeChild(iframe), 1000);
            }, 500);
        };

        // --- KOMPONEN UTAMA APLIKASI ---
        function App() {
            const [user, setUser] = useState(null);
            const [isUiLoggedIn, setIsUiLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const [pelangganData, setPelangganData] = useState([]);
            const [tagihanData, setTagihanData] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const pelangganRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('pelanggan');
                const tagihanRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('tagihan');

                const unsubP = pelangganRef.onSnapshot(snap => setPelangganData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubT = tagihanRef.onSnapshot(snap => setTagihanData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubP(); unsubT(); };
            }, [user]);

            const showToast = (msg) => {
                setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000);
            };

            if (!isUiLoggedIn) return <LoginScreen onLogin={() => setIsUiLoggedIn(true)} showToast={showToast} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {toastMessage && <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-4 py-2 rounded shadow animate-bounce">{toastMessage}</div>}

                    {/* Sidebar PC */}
                    <aside className="hidden md:flex flex-col w-64 bg-blue-900 text-white h-full shadow-xl">
                        <div className="flex items-center justify-center h-20 border-b border-blue-800">
                            <i className="fas fa-tint text-2xl text-blue-300 mr-2"></i>
                            <h1 className="text-xl font-bold">HIPAB SRIKOYO</h1>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2">
                            <NavItem icon="fa-home" label="Dashboard" active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')} />
                            <NavItem icon="fa-users" label="Pelanggan" active={activeTab==='pelanggan'} onClick={()=>setActiveTab('pelanggan')} />
                            <NavItem icon="fa-file-invoice-dollar" label="Tagihan" active={activeTab==='tagihan'} onClick={()=>setActiveTab('tagihan')} />
                            <NavItem icon="fa-chart-bar" label="Pelaporan" active={activeTab==='pelaporan'} onClick={()=>setActiveTab('pelaporan')} />
                        </nav>
                        <div className="p-4 border-t border-blue-800">
                            <button onClick={()=>setIsUiLoggedIn(false)} className="flex items-center w-full px-4 py-2 text-blue-200 hover:bg-blue-800 hover:text-white rounded"><i className="fas fa-sign-out-alt mr-3"></i> Logout</button>
                        </div>
                    </aside>

                    {/* Konten Utama & Header Mobile */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        <header className="md:hidden flex items-center justify-between bg-blue-900 text-white p-4">
                            <div className="flex items-center"><i className="fas fa-tint text-xl text-blue-300 mr-2"></i><h1 className="text-lg font-bold">HIPAB SRIKOYO</h1></div>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><i className={`fas ${isMobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i></button>
                        </header>

                        {isMobileMenuOpen && (
                            <div className="md:hidden bg-blue-800 text-white px-2 py-4 space-y-1">
                                <NavItem icon="fa-home" label="Dashboard" active={activeTab==='dashboard'} onClick={()=>{setActiveTab('dashboard'); setIsMobileMenuOpen(false);}} />
                                <NavItem icon="fa-users" label="Pelanggan" active={activeTab==='pelanggan'} onClick={()=>{setActiveTab('pelanggan'); setIsMobileMenuOpen(false);}} />
                                <NavItem icon="fa-file-invoice-dollar" label="Tagihan" active={activeTab==='tagihan'} onClick={()=>{setActiveTab('tagihan'); setIsMobileMenuOpen(false);}} />
                                <NavItem icon="fa-chart-bar" label="Pelaporan" active={activeTab==='pelaporan'} onClick={()=>{setActiveTab('pelaporan'); setIsMobileMenuOpen(false);}} />
                                <button onClick={()=>setIsUiLoggedIn(false)} className="flex items-center w-full px-4 py-3 bg-red-600 rounded mt-4"><i className="fas fa-sign-out-alt mr-3"></i> Logout</button>
                            </div>
                        )}

                        <main className="flex-1 overflow-y-auto p-4 md:p-8">
                            {activeTab === 'dashboard' && <Dashboard pelanggan={pelangganData} tagihan={tagihanData} />}
                            {activeTab === 'pelanggan' && <PelangganManager user={user} data={pelangganData} showToast={showToast} />}
                            {activeTab === 'tagihan' && <TagihanManager user={user} pelanggan={pelangganData} tagihan={tagihanData} showToast={showToast} />}
                            {activeTab === 'pelaporan' && <Pelaporan pelanggan={pelangganData} tagihan={tagihanData} />}
                        </main>
                    </div>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg ${active ? 'bg-blue-800 text-white' : 'text-blue-200 hover:bg-blue-800'}`}>
                    <i className={`fas ${icon} w-5 text-center mr-3`}></i> {label}
                </button>
            );
        }

        // --- LAYAR LOGIN ---
        function LoginScreen({ onLogin, showToast }) {
            const [user, setUser] = useState(''); const [pass, setPass] = useState('');
            const handleLogin = (e) => { e.preventDefault(); if(user==='admin' && pass==='admin123') { onLogin(); showToast('Login Berhasil'); } else alert('Salah! (Gunakan admin / admin123)'); };
            return (
                <div className="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-900 to-blue-600 px-4">
                    <form onSubmit={handleLogin} className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
                        <div className="text-center mb-6"><i className="fas fa-tint text-4xl text-blue-600 mb-2"></i><h2 className="text-2xl font-bold">HIPAB SRIKOYO</h2></div>
                        <input type="text" placeholder="Username" value={user} onChange={e=>setUser(e.target.value)} className="w-full px-4 py-2 border rounded mb-4" required/>
                        <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full px-4 py-2 border rounded mb-6" required/>
                        <button className="w-full bg-blue-600 text-white py-2 rounded font-bold"><i className="fas fa-sign-in-alt mr-2"></i> Masuk</button>
                    </form>
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ pelanggan, tagihan }) {
            const currentMonth = new Date().toISOString().slice(0, 7);
            const pemasukan = tagihan.filter(t => t.periode === currentMonth && t.status === 'Terbayar').reduce((s, t) => s + t.total, 0);
            const tunggakan = tagihan.filter(t => t.periode === currentMonth && t.status === 'Belum Terbayar').reduce((s, t) => s + t.total, 0);
            const totalTunggakan = tagihan.filter(t => t.status === 'Belum Terbayar').reduce((s, t) => s + t.total, 0);
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold border-b pb-2">Dashboard</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white p-5 rounded-xl border flex justify-between items-center"><div><p className="text-sm text-gray-500">Pelanggan Aktif</p><p className="text-2xl font-bold">{pelanggan.filter(p=>p.status==='Aktif').length}</p></div><i className="fas fa-users text-3xl text-blue-500"></i></div>
                        <div className="bg-white p-5 rounded-xl border flex justify-between items-center"><div><p className="text-sm text-gray-500">Pemasukan Bulan Ini</p><p className="text-xl font-bold text-green-600">{formatRp(pemasukan)}</p></div><i className="fas fa-check-circle text-3xl text-green-500"></i></div>
                        <div className="bg-white p-5 rounded-xl border flex justify-between items-center"><div><p className="text-sm text-gray-500">Tunggakan Bulan Ini</p><p className="text-xl font-bold text-yellow-600">{formatRp(tunggakan)}</p></div><i className="fas fa-times-circle text-3xl text-yellow-500"></i></div>
                        <div className="bg-white p-5 rounded-xl border flex justify-between items-center"><div><p className="text-sm text-gray-500">Total Tunggakan</p><p className="text-xl font-bold text-red-600">{formatRp(totalTunggakan)}</p></div><i className="fas fa-file-invoice-dollar text-3xl text-red-500"></i></div>
                    </div>
                </div>
            );
        }

        // --- MANAJEMEN PELANGGAN ---
        function PelangganManager({ user, data, showToast }) {
            const [modal, setModal] = useState(false); const [editId, setEditId] = useState(null);
            const [form, setForm] = useState({ no: '', nama: '', rt: '', rw: '', status: 'Aktif', hp: '' });

            const openModal = (p = null) => {
                if(p) { setEditId(p.id); setForm({ no: p.noPelanggan, nama: p.nama, rt: p.rt, rw: p.rw, status: p.status, hp: p.noHp }); }
                else { setEditId(null); setForm({ no: '', nama: '', rt: '', rw: '', status: 'Aktif', hp: '' }); }
                setModal(true);
            };

            const simpan = async (e) => {
                e.preventDefault();
                const payload = { noPelanggan: form.no, nama: form.nama, rt: form.rt, rw: form.rw, status: form.status, noHp: form.hp };
                const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('pelanggan');
                try {
                    if (editId) await ref.doc(editId).update(payload); else await ref.add(payload);
                    setModal(false); showToast('Data Tersimpan');
                } catch(err) { alert(err.message); }
            };

            const hapus = async (id) => { if(window.confirm('Hapus?')) await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('pelanggan').doc(id).delete(); };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center border-b pb-4"><h2 className="text-2xl font-bold">Pelanggan</h2><button onClick={()=>openModal()} className="bg-blue-600 text-white px-4 py-2 rounded text-sm"><i className="fas fa-plus mr-1"></i> Tambah</button></div>
                    <div className="bg-white rounded border overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-gray-50 border-b"><tr><th className="p-3">No</th><th className="p-3">Nama</th><th className="p-3">RT/RW</th><th className="p-3">Status</th><th className="p-3">Aksi</th></tr></thead>
                            <tbody>
                                {data.map(p => (
                                    <tr key={p.id} className="border-b">
                                        <td className="p-3">{p.noPelanggan}</td><td className="p-3">{p.nama}</td><td className="p-3">{p.rt}/{p.rw}</td>
                                        <td className="p-3"><span className={`px-2 py-1 rounded text-xs ${p.status==='Aktif'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{p.status}</span></td>
                                        <td className="p-3 space-x-2"><button onClick={()=>openModal(p)} className="text-blue-500"><i className="fas fa-edit"></i></button><button onClick={()=>hapus(p.id)} className="text-red-500"><i className="fas fa-trash"></i></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {modal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <form onSubmit={simpan} className="bg-white p-6 rounded w-full max-w-md">
                                <h3 className="font-bold text-lg mb-4">{editId ? 'Edit' : 'Tambah'} Pelanggan</h3>
                                <div className="space-y-2 mb-4">
                                    <input placeholder="No Pelanggan" value={form.no} onChange={e=>setForm({...form, no:e.target.value})} className="border p-2 w-full rounded" required/>
                                    <input placeholder="Nama Lengkap" value={form.nama} onChange={e=>setForm({...form, nama:e.target.value})} className="border p-2 w-full rounded" required/>
                                    <input placeholder="No HP" value={form.hp} onChange={e=>setForm({...form, hp:e.target.value})} className="border p-2 w-full rounded"/>
                                    <div className="flex gap-2"><input placeholder="RT" value={form.rt} onChange={e=>setForm({...form, rt:e.target.value})} className="border p-2 w-1/2 rounded"/><input placeholder="RW" value={form.rw} onChange={e=>setForm({...form, rw:e.target.value})} className="border p-2 w-1/2 rounded"/></div>
                                    <select value={form.status} onChange={e=>setForm({...form, status:e.target.value})} className="border p-2 w-full rounded"><option>Aktif</option><option>Tidak Aktif</option></select>
                                </div>
                                <div className="flex justify-end gap-2"><button type="button" onClick={()=>setModal(false)} className="px-4 py-2 border rounded">Batal</button><button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded">Simpan</button></div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // --- MANAJEMEN TAGIHAN ---
        function TagihanManager({ user, pelanggan, tagihan, showToast }) {
            const [periode, setPeriode] = useState(new Date().toISOString().slice(0, 7));
            const [modal, setModal] = useState(false); const [selP, setSelP] = useState(null);
            const [existT, setExistT] = useState(null);
            const [mAwal, setMAwal] = useState(''); const [mAkhir, setMAkhir] = useState('');

            const kubik = Math.max(0, Number(mAkhir) - Number(mAwal));
            const total = (kubik * 1500) + 2000;

            const openTagihan = (p) => {
                const t = tagihan.find(x => x.idPelanggan === p.id && x.periode === periode);
                setSelP(p); setExistT(t);
                if(t) { setMAwal(t.meterAwal); setMAkhir(t.meterAkhir); } else { setMAwal('0'); setMAkhir(''); }
                setModal(true);
            };

            const simpan = async (e) => {
                e.preventDefault();
                const payload = { idPelanggan: selP.id, periode, meterAwal: Number(mAwal), meterAkhir: Number(mAkhir), total, status: existT ? existT.status : 'Belum Terbayar' };
                const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('tagihan');
                if(existT) await ref.doc(existT.id).update(payload); else await ref.add(payload);
                setModal(false); showToast('Tagihan Disimpan');
            };

            const toggleStatus = async (t) => {
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('tagihan').doc(t.id).update({ status: t.status === 'Terbayar' ? 'Belum Terbayar' : 'Terbayar' });
            };

            const copyWA = (p, t) => {
                const msg = `Tagihan Air HIPAB Srikoyo\nNama: ${p.nama}\nPeriode: ${t.periode}\nTotal: ${formatRp(t.total)}\nStatus: ${t.status}`;
                copyToClipboard(msg); showToast("Format WA Disalin");
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center border-b pb-4"><h2 className="text-2xl font-bold">Tagihan</h2><input type="month" value={periode} onChange={e=>setPeriode(e.target.value)} className="border p-2 rounded"/></div>
                    <div className="bg-white rounded border overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-gray-50 border-b"><tr><th className="p-3">Pelanggan</th><th className="p-3">Tagihan</th><th className="p-3">Status</th><th className="p-3">Aksi</th></tr></thead>
                            <tbody>
                                {pelanggan.map(p => {
                                    const t = tagihan.find(x => x.idPelanggan === p.id && x.periode === periode);
                                    return (
                                        <tr key={p.id} className="border-b"><td className="p-3 font-medium">{p.nama}</td>
                                        {t ? (
                                            <>
                                                <td className="p-3">{formatRp(t.total)}</td>
                                                <td className="p-3"><button onClick={()=>toggleStatus(t)} className={`px-2 py-1 rounded text-xs ${t.status==='Terbayar'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{t.status}</button></td>
                                                <td className="p-3 space-x-2 text-lg text-gray-600"><button onClick={()=>copyWA(p,t)}><i className="fab fa-whatsapp text-green-500"></i></button><button onClick={()=>openTagihan(p)}><i className="fas fa-edit text-blue-500"></i></button></td>
                                            </>
                                        ) : (<td colSpan="3" className="p-3"><button onClick={()=>openTagihan(p)} className="bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs">Buat Tagihan</button></td>)}
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>

                    {modal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <form onSubmit={simpan} className="bg-white p-6 rounded w-full max-w-sm">
                                <h3 className="font-bold mb-2">Input Tagihan: {selP.nama}</h3>
                                <div className="flex gap-2 mb-4"><input type="number" placeholder="M. Awal" value={mAwal} onChange={e=>setMAwal(e.target.value)} className="border p-2 w-1/2 rounded" required/><input type="number" placeholder="M. Akhir" value={mAkhir} onChange={e=>setMAkhir(e.target.value)} className="border p-2 w-1/2 rounded" required/></div>
                                <div className="bg-gray-100 p-3 rounded mb-4 text-sm"><p>Pemakaian: {kubik} m3</p><p>Tarif: {formatRp(kubik * 1500)}</p><p>Beban: Rp 2.000</p><p className="font-bold text-lg border-t mt-2 pt-2">Total: {formatRp(total)}</p></div>
                                <div className="flex justify-end gap-2"><button type="button" onClick={()=>setModal(false)} className="px-4 py-2 border rounded">Batal</button><button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded">Simpan</button></div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // --- PELAPORAN ---
        function Pelaporan({ pelanggan, tagihan }) {
            const [periode, setPeriode] = useState(new Date().toISOString().slice(0, 7));
            const tags = tagihan.filter(t => t.periode === periode);
            
            const cetak = () => {
                let html = `<h2 class="text-center">Laporan Tagihan - ${periode}</h2><table><tr><th>Nama</th><th>Total</th><th>Status</th></tr>`;
                tags.forEach(t => {
                    const nama = pelanggan.find(p => p.id === t.idPelanggan)?.nama || '-';
                    html += `<tr><td>${nama}</td><td>${formatRp(t.total)}</td><td>${t.status}</td></tr>`;
                });
                html += `</table>`;
                printContent(html, 'a4');
            };

            return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-bold border-b pb-4">Pelaporan</h2>
                    <div className="bg-white p-4 border rounded flex gap-4"><input type="month" value={periode} onChange={e=>setPeriode(e.target.value)} className="border p-2 rounded"/> <button onClick={cetak} className="bg-green-600 text-white px-4 py-2 rounded"><i className="fas fa-print mr-2"></i>Cetak A4</button></div>
                </div>
            );
        }

        // Render Aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
