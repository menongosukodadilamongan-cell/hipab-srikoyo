<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Air Bersih</title>
    
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import FontAwesome (Ikon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Import React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Import Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🛑 KONFIGURASI FIREBASE 🛑
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCGxO7B7PMPv3YhSNVcm-CpWUcxVPIA4bM",
            authDomain: "hipab-srikoyo-data.firebaseapp.com",
            projectId: "hipab-srikoyo-data",
            storageBucket: "hipab-srikoyo-data.firebasestorage.app",
            messagingSenderId: "741286764093",
            appId: "1:741286764093:web:b355072e65eca80ea91454",
            measurementId: "G-C5YGGWQDPQ"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const DB_PUSAT = db.collection('srikoyo_database').doc('main_data');
        const { useState, useEffect, useRef } = React;

        // --- FUNGSI BANTUAN (UTILITY) ---
        const formatRp = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);
        const formatBulanTahunSingkat = (isoString) => {
            if(!isoString) return '';
            const [y, m] = isoString.split('-');
            const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
            return `${months[parseInt(m)-1]} ${y.slice(2)}`;
        };
        const formatBulanTahunLengkap = (isoString) => {
            if(!isoString) return '';
            const [y, m] = isoString.split('-');
            const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            return `${months[parseInt(m)-1]} ${y}`;
        };
        const getCurrentDate = () => {
            const d = new Date();
            const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
            return `${String(d.getDate()).padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        };
        const getCurrentDateYMD = () => new Date().toISOString().slice(0, 10);
        
        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text; document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); return true; } catch (err) { return false; } finally { document.body.removeChild(textArea); }
        };

        // --- SISTEM PEMBAYARAN FLEKSIBEL ---
        const getTerbayar = (t) => {
            if (!t) return 0;
            if (t.terbayar !== undefined) return Number(t.terbayar);
            return t.status === 'Terbayar' ? Number(t.total) : 0;
        };
        const getSisa = (t) => { if (!t) return 0; return Math.max(0, t.total - getTerbayar(t)); };
        const getStatusLabel = (t) => {
            if (!t) return '-';
            const sisa = getSisa(t); const terbayar = getTerbayar(t);
            if (sisa <= 0) return 'LUNAS'; if (terbayar > 0) return 'NYICIL'; return 'BELUM';
        };
        const getTunggakanLalu = (semuaTagihan, idPelanggan, currentPeriode) => {
            return semuaTagihan.filter(t => t.idPelanggan === idPelanggan && t.periode < currentPeriode).reduce((s, t) => s + getSisa(t), 0);
        };

        // Format Struk Thermal Bluetooth
        const alignCenter = (text) => { const str = String(text); return str.padStart(Math.floor((32 - str.length) / 2) + str.length).padEnd(32); };
        const alignLeftRight = (left, right) => { const strLeft = String(left); const strRight = String(right); const spaces = 32 - strLeft.length - strRight.length; return strLeft + ' '.repeat(Math.max(0, spaces)) + strRight; };

        const printContent = (htmlContent, mode) => {
            const iframe = document.createElement('iframe');
            iframe.style.position = 'fixed'; iframe.style.right = '0'; iframe.style.bottom = '0';
            iframe.style.width = '0'; iframe.style.height = '0'; iframe.style.border = '0';
            document.body.appendChild(iframe);
            
            const doc = iframe.contentWindow.document;
            let style = `<style>body { font-family: 'Segoe UI', Tahoma, sans-serif; color: #000; }</style>`;
            
            if (mode === 'receipt') {
                style += `<style>
                    @page { size: 58mm auto; margin: 0; } 
                    body { width: 54mm; font-size: 11px; margin: 2mm; padding:0; line-height: 1.4; } 
                    hr { border: 0.5px dashed #000; margin: 6px 0; }
                    .text-center { text-align: center; } .text-right { text-align: right; } .bold { font-weight: bold; }
                    .title { font-size: 14px; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
                    table { width: 100%; font-size: 11px; } td { padding: 2px 0; }
                </style>`;
            } else {
                style += `<style>
                    @page { size: A4 portrait; margin: 15mm; } 
                    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; } 
                    th, td { border: 1px solid #333; padding: 8px; text-align: left; }
                    th { background-color: #f3f4f6; text-align: center; }
                    .text-center { text-align: center; } .text-right { text-align: right; }
                    h2, h3 { margin: 0 0 5px 0; }
                    .header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
                    .no-border td { border: none; padding: 4px 0; }
                </style>`;
            }
            
            doc.open(); doc.write(`<html><head><title>Cetak Dokumen</title>${style}</head><body>${htmlContent}</body></html>`); doc.close();
            iframe.onload = function() { iframe.contentWindow.focus(); iframe.contentWindow.print(); setTimeout(() => document.body.removeChild(iframe), 2000); };
        };

        const LogoRenderer = ({ logo, className }) => {
            if(logo && logo.startsWith('data:image')) return <img src={logo} className={className} alt="Logo" style={{objectFit:'contain', width: '100%', height: '100%'}} />;
            return <i className={`fas fa-tint ${className}`}></i>;
        };

        // ==========================================
        // KOMPONEN UTAMA APLIKASI
        // ==========================================
        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('hipab_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            
            const [pelangganData, setPelangganData] = useState([]);
            const [tagihanData, setTagihanData] = useState([]);
            const [pengeluaranData, setPengeluaranData] = useState([]);
            const [keluhanData, setKeluhanData] = useState([]);
            const [adminUsers, setAdminUsers] = useState([]);
            const [settings, setSettings] = useState({ appName: 'BUMDES SRIKOYO', appSubtitle: 'UNIT HIPAB', tarif: 1500, beban: 2000, logo: '' });

            useEffect(() => { 
                const initAuth = async () => { try { await auth.signInAnonymously(); } catch (err) { console.error("Auth Error", err); } };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(user => setFirebaseUser(user));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!firebaseUser) return;
                const unsubConfig = DB_PUSAT.collection('pengaturan').doc('konfigurasi').onSnapshot(doc => {
                    if(doc.exists) setSettings(doc.data()); else DB_PUSAT.collection('pengaturan').doc('konfigurasi').set(settings);
                });
                const unsubUsers = DB_PUSAT.collection('pengaturan').doc('users').onSnapshot(doc => {
                    if(doc.exists) setAdminUsers(doc.data().list || []);
                    else {
                        const defaultUsers = [{ id: Date.now().toString(), username: 'admin', password: 'admin123', role: 'Admin', wilayah: '' }];
                        DB_PUSAT.collection('pengaturan').doc('users').set({ list: defaultUsers }); setAdminUsers(defaultUsers);
                    }
                });

                if (!currentUser) return () => { unsubConfig(); unsubUsers(); };

                const unsubP = DB_PUSAT.collection('pelanggan').onSnapshot(snap => setPelangganData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubT = DB_PUSAT.collection('tagihan').onSnapshot(snap => setTagihanData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubK = DB_PUSAT.collection('pengeluaran').onSnapshot(snap => setPengeluaranData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubKeluhan = DB_PUSAT.collection('keluhan').onSnapshot(snap => setKeluhanData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubP(); unsubT(); unsubK(); unsubKeluhan(); unsubConfig(); unsubUsers(); };
            }, [currentUser, firebaseUser]);

            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };
            
            const handleLogout = () => { 
                localStorage.removeItem('hipab_user'); 
                setCurrentUser(null); 
                setActiveTab('dashboard');
            };

            if (!firebaseUser) return <div className="flex h-[100dvh] items-center justify-center bg-blue-900 text-white flex-col"><i className="fas fa-circle-notch fa-spin text-5xl mb-4"></i><h2 className="text-xl font-bold">Menghubungkan Server...</h2></div>;
            
            if (!currentUser) return <LoginScreen users={adminUsers} settings={settings} onLogin={(userObj) => { 
                localStorage.setItem('hipab_user', JSON.stringify(userObj)); 
                setCurrentUser(userObj); 
            }} showToast={showToast} />;

            const isAdmin = currentUser.role === 'Admin';

            return (
                <div className="flex h-[100dvh] overflow-hidden">
                    {toastMessage && <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg flex items-center animate-bounce z-[100]"><i className="fas fa-check-circle mr-2"></i> {toastMessage}</div>}

                    <aside className="hidden md:flex flex-col w-64 bg-blue-900 text-white h-full shadow-xl z-20 relative">
                        <div className="flex flex-col items-center justify-center py-6 border-b border-blue-800">
                            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-3 overflow-hidden p-2 text-blue-600"><LogoRenderer logo={settings.logo} className="text-3xl" /></div>
                            <h1 className="text-lg font-bold tracking-wide text-center px-2 leading-tight">{settings.appName}</h1>
                            {settings.appSubtitle && <p className="text-sm font-medium text-blue-200 text-center px-2 mt-1">{settings.appSubtitle}</p>}
                            <span className="mt-3 bg-blue-800 px-3 py-1 rounded-full text-xs border border-blue-700">Login: {currentUser.username} ({currentUser.role})</span>
                            {currentUser.wilayah && <span className="mt-1 text-[10px] text-blue-300">Akses Wilayah Terbatas</span>}
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            <NavItem icon="fa-home" label="Dashboard" active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')} />
                            <NavItem icon="fa-users" label="Pelanggan" active={activeTab==='pelanggan'} onClick={()=>setActiveTab('pelanggan')} />
                            <NavItem icon="fa-file-invoice-dollar" label="Tagihan" active={activeTab==='tagihan'} onClick={()=>setActiveTab('tagihan')} />
                            <NavItem icon="fa-tools" label="Keluhan & Perbaikan" active={activeTab==='keluhan'} onClick={()=>setActiveTab('keluhan')} />
                            {isAdmin && <NavItem icon="fa-book" label="Buku Kas (Pengeluaran)" active={activeTab==='pengeluaran'} onClick={()=>setActiveTab('pengeluaran')} />}
                            {isAdmin && <NavItem icon="fa-chart-pie" label="Pelaporan" active={activeTab==='pelaporan'} onClick={()=>setActiveTab('pelaporan')} />}
                            {isAdmin && <NavItem icon="fa-cog" label="Pengaturan" active={activeTab==='pengaturan'} onClick={()=>setActiveTab('pengaturan')} />}
                        </nav>
                        <div className="p-4 border-t border-blue-800"><button onClick={handleLogout} className="flex items-center justify-center w-full px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded transition-colors"><i className="fas fa-sign-out-alt mr-2"></i> Keluar</button></div>
                    </aside>

                    <div className="flex-1 flex flex-col h-full overflow-hidden bg-gray-50 relative">
                        <header className="md:hidden flex items-center justify-between bg-blue-900 text-white p-4 shadow-md z-10">
                            <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 bg-blue-800 rounded"><i className="fas fa-bars text-xl"></i></button>
                            <div className="flex items-center font-bold">
                                <div className="w-6 h-6 mr-2 flex items-center justify-center text-blue-300"><LogoRenderer logo={settings.logo} className="text-lg" /></div>
                                <div className="flex flex-col"><span className="truncate max-w-[180px] leading-tight">{settings.appName}</span>{settings.appSubtitle && <span className="text-xs text-blue-200 truncate max-w-[180px] font-medium leading-tight">{settings.appSubtitle}</span>}</div>
                            </div><div className="w-8"></div>
                        </header>

                        {isMobileMenuOpen && (
                            <div className="md:hidden fixed inset-0 z-50 flex">
                                <div className="bg-blue-900 w-64 h-full shadow-2xl flex flex-col transform transition-transform duration-300">
                                    <div className="flex items-center justify-between p-4 border-b border-blue-800 text-white">
                                        <h2 className="font-bold text-lg">Menu Utama</h2><button onClick={() => setIsMobileMenuOpen(false)} className="p-2"><i className="fas fa-times text-xl"></i></button>
                                    </div>
                                    <nav className="flex-1 px-4 py-4 space-y-2 overflow-y-auto">
                                        <NavItem icon="fa-home" label="Dashboard" active={activeTab==='dashboard'} onClick={()=>{setActiveTab('dashboard'); setIsMobileMenuOpen(false);}} />
                                        <NavItem icon="fa-users" label="Pelanggan" active={activeTab==='pelanggan'} onClick={()=>{setActiveTab('pelanggan'); setIsMobileMenuOpen(false);}} />
                                        <NavItem icon="fa-file-invoice-dollar" label="Tagihan" active={activeTab==='tagihan'} onClick={()=>{setActiveTab('tagihan'); setIsMobileMenuOpen(false);}} />
                                        <NavItem icon="fa-tools" label="Keluhan & Perbaikan" active={activeTab==='keluhan'} onClick={()=>{setActiveTab('keluhan'); setIsMobileMenuOpen(false);}} />
                                        {isAdmin && <NavItem icon="fa-book" label="Buku Kas" active={activeTab==='pengeluaran'} onClick={()=>{setActiveTab('pengeluaran'); setIsMobileMenuOpen(false);}} />}
                                        {isAdmin && <NavItem icon="fa-chart-pie" label="Pelaporan" active={activeTab==='pelaporan'} onClick={()=>{setActiveTab('pelaporan'); setIsMobileMenuOpen(false);}} />}
                                        {isAdmin && <NavItem icon="fa-cog" label="Pengaturan" active={activeTab==='pengaturan'} onClick={()=>{setActiveTab('pengaturan'); setIsMobileMenuOpen(false);}} />}
                                    </nav>
                                    <div className="p-4 border-t border-blue-800"><button onClick={handleLogout} className="flex items-center justify-center w-full px-4 py-3 bg-red-600 text-white rounded"><i className="fas fa-sign-out-alt mr-2"></i> Keluar</button></div>
                                </div>
                                <div className="flex-1 bg-black bg-opacity-50" onClick={() => setIsMobileMenuOpen(false)}></div>
                            </div>
                        )}

                        <main className="flex-1 overflow-y-auto p-4 md:p-8 pb-32 md:pb-8">
                            {activeTab === 'dashboard' && <Dashboard pelanggan={pelangganData} tagihan={tagihanData} pengeluaran={pengeluaranData} keluhan={keluhanData} isAdmin={isAdmin} currentUser={currentUser} />}
                            {activeTab === 'pelanggan' && <PelangganManager data={pelangganData} showToast={showToast} isAdmin={isAdmin} currentUser={currentUser} />}
                            {activeTab === 'tagihan' && <TagihanManager pelanggan={pelangganData} tagihan={tagihanData} settings={settings} showToast={showToast} isAdmin={isAdmin} currentUser={currentUser} />}
                            {activeTab === 'keluhan' && <KeluhanManager data={keluhanData} pelanggan={pelangganData} showToast={showToast} isAdmin={isAdmin} currentUser={currentUser} />}
                            {activeTab === 'pengeluaran' && isAdmin && <PengeluaranManager data={pengeluaranData} showToast={showToast} />}
                            {activeTab === 'pelaporan' && isAdmin && <Pelaporan pelanggan={pelangganData} tagihan={tagihanData} pengeluaran={pengeluaranData} settings={settings} />}
                            {activeTab === 'pengaturan' && isAdmin && <PengaturanManager settings={settings} adminUsers={adminUsers} showToast={showToast} />}
                        </main>
                    </div>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) { return <button onClick={onClick} className={`flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg transition-colors ${active ? 'bg-blue-800 text-white shadow-inner' : 'text-blue-200 hover:bg-blue-800 hover:text-white'}`}><i className={`fas ${icon} w-6 text-center mr-2 text-lg`}></i> {label}</button>; }

        // ==========================================
        // LAYAR LOGIN
        // ==========================================
        function LoginScreen({ users, settings, onLogin, showToast }) {
            const [user, setUser] = useState(''); const [pass, setPass] = useState('');
            const handleLogin = (e) => { 
                e.preventDefault(); 
                if(users.length === 0 && user === 'admin' && pass === 'admin123') { 
                    onLogin({username: 'admin', role: 'Admin', wilayah: ''}); showToast('Selamat Datang Admin!'); return; 
                }
                const validUser = users.find(u => u.username === user && u.password === pass);
                if(validUser) { 
                    const loggedUser = {...validUser, role: validUser.role || 'Admin', wilayah: validUser.wilayah || ''};
                    onLogin(loggedUser); 
                    showToast(`Selamat Datang ${loggedUser.role}!`); 
                } 
                else alert('Username atau Password Salah!'); 
            };
            return (
                <div className="flex items-center justify-center min-h-[100dvh] bg-gradient-to-br from-blue-900 via-blue-800 to-blue-600 px-4">
                    <form onSubmit={handleLogin} className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
                        <div className="text-center mb-8">
                            <div className="bg-blue-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 overflow-hidden p-3 text-blue-600"><LogoRenderer logo={settings.logo} className="text-5xl" /></div>
                            <h2 className="text-2xl font-bold text-gray-800 uppercase leading-tight">{settings.appName}</h2>
                            {settings.appSubtitle ? <p className="text-base text-blue-600 font-bold mt-1">{settings.appSubtitle}</p> : <p className="text-sm text-gray-500 mt-1">Silakan masuk ke akun Anda</p>}
                        </div>
                        <div className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Username</label><input type="text" value={user} onChange={e=>setUser(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none" required/></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none" required/></div>
                        </div>
                        <button className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold mt-8 shadow-lg"><i className="fas fa-sign-in-alt mr-2"></i> Masuk Aplikasi</button>
                    </form>
                </div>
            );
        }

        // ==========================================
        // DASHBOARD
        // ==========================================
        function Dashboard({ pelanggan, tagihan, pengeluaran, keluhan, isAdmin, currentUser }) {
            const currentMonth = new Date().toISOString().slice(0, 7);
            
            // Logika Multi-Wilayah untuk Petugas di Dashboard
            const userWilayahList = currentUser.wilayah ? String(currentUser.wilayah).split(',').map(w=>w.trim()).filter(Boolean) : [];
            const isPetugasLocked = !isAdmin && userWilayahList.length > 0;
            const [filterWilayah, setFilterWilayah] = useState('Semua');
            
            const allWilayahs = [...new Set(pelanggan.map(p => p.wilayah).filter(w => w && w.trim() !== ''))];
            const dropdownWilayahs = isPetugasLocked ? ['Semua', ...userWilayahList] : ['Semua', ...allWilayahs];

            const filteredPelanggan = pelanggan.filter(p => {
                if (isPetugasLocked) {
                    if (filterWilayah === 'Semua') return userWilayahList.includes(p.wilayah);
                    return p.wilayah === filterWilayah;
                }
                return filterWilayah === 'Semua' || p.wilayah === filterWilayah;
            });

            const validPelangganIds = new Set(filteredPelanggan.map(p => p.id));
            const pelangganAktif = filteredPelanggan.filter(p=>p.status==='Aktif').length;
            
            const validTagihan = tagihan.filter(t => validPelangganIds.has(t.idPelanggan));
            const tagihanBulanIni = validTagihan.filter(t => t.periode === currentMonth);
            const pemasukan = tagihanBulanIni.reduce((s, t) => s + getTerbayar(t), 0);
            const tunggakan = tagihanBulanIni.reduce((s, t) => s + getSisa(t), 0);
            const totalTunggakan = validTagihan.reduce((s, t) => s + getSisa(t), 0);
            
            // Pengeluaran & Laba Bersih hanya relevan jika Admin dan melihat Semua wilayah (pengeluaran sifatnya global)
            const showPengeluaran = isAdmin && filterWilayah === 'Semua';
            const pengeluaranBulanIni = showPengeluaran ? pengeluaran.filter(k => k.tanggal.startsWith(currentMonth)).reduce((s, k) => s + Number(k.nominal), 0) : 0;
            const labaBersih = pemasukan - pengeluaranBulanIni;

            const keluhanPending = keluhan ? keluhan.filter(k => k.status !== 'Selesai' && validPelangganIds.has(k.idPelanggan)).length : 0;

            const last6Months = Array.from({length: 6}, (_, i) => { const d = new Date(); d.setMonth(d.getMonth() - i); return d.toISOString().slice(0, 7); }).reverse();
            const chartData = last6Months.map(month => ({ label: formatBulanTahunSingkat(month), value: validTagihan.filter(t => t.periode === month).reduce((s, t) => s + getTerbayar(t), 0) }));
            const maxVal = Math.max(...chartData.map(d => d.value), 100000) || 1;

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 gap-4">
                        <h2 className="text-2xl font-bold text-gray-800">Dashboard {filterWilayah !== 'Semua' ? `(${filterWilayah})` : ''}</h2>
                        <div className="flex gap-2 items-center">

                                <option value="Semua">Semua Status</option>

                                <option value="Proses">Sedang Diproses</option>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto">

                            <thead className="bg-gray-50 text-gray-600 border-b">

                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {filteredData.map(k => (
                                    <tr key={k.id} className="hover:bg-gray-50">
                                        <td className="p-4 text-gray-500">{k.tanggal}</td>
                                        <td className="p-4 font-medium"><div className="text-gray-800">{getPelangganName(k.idPelanggan)}</div><div className="text-xs text-gray-500">{getPelangganWilayah(k.idPelanggan)}</div></td>
                                        <td className="p-4 whitespace-normal min-w-[200px] text-red-600 font-medium">{k.keluhan}</td>

                    {modal && (

                                    <div>
                                        <label className="text-xs font-medium text-gray-600 block mb-1">Pilih Warga Pelapor</label>
                                        <select value={form.idPelanggan} onChange={e=>setForm({...form, idPelanggan:e.target.value})} className="border p-2 w-full rounded focus:ring-2 focus:ring-orange-500 outline-none bg-white" required>
                                            {pelangganOptions.map(p => <option key={p.id} value={p.id}>{p.nama} ({p.noPelanggan})</option>)}

                                    <div>

                                        <select value={form.status} onChange={e=>setForm({...form, status:e.target.value})} className="border p-2 w-full rounded focus:ring-2 focus:ring-orange-500 outline-none bg-white font-bold text-orange-700">
                                            <option value="Menunggu">Menunggu / Belum Ditangani</option>

                                        <div><label className="text-xs font-medium text-gray-600 block mb-1">Catatan Tindak Lanjut / Perbaikan</label><input type="text" placeholder="Cth: Sudah diganti pipa baru" value={form.keterangan} onChange={e=>setForm({...form, keterangan:e.target.value})} className="border p-2 w-full rounded focus:ring-2 focus:ring-orange-500 outline-none"/></div>
                                    )}

                                <div className="flex justify-end gap-3"><button type="button" onClick={()=>setModal(false)} className="px-5 py-2 border rounded-lg text-gray-600 hover:bg-gray-50">Batal</button><button type="submit" className="px-5 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-lg font-medium">Simpan Laporan</button></div>
